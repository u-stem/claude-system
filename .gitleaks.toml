# gitleaks configuration for claude-system.
# Phase 7b: extends gitleaks defaults with allowlists for templates/drafts and
# explicit placeholder regexes.
#
# rc2 (post-ADR-0006): the user-identifier path-allowlist for ADR 0001 was
# removed because ADR 0006 establishes "no user identifiers inside the
# system" as the first defence line. With no literals in the tree, the
# detector has nothing to false-positive on and there is nothing to
# allowlist. Detection is now a pure last-resort: anything matched in
# README.md / meta/*.md is a real new leak.

title = "claude-system gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Suppress false positives in templates, drafts, and intentional placeholders only. User identifiers are kept out of the tree per ADR 0006, so no path-level allowlist is needed for them."

# Path allowlist: only generated artefacts / templates / drafts / this config.
# Documentation trees (README.md, meta/*.md, principles/, ADRs themselves)
# are scanned in full — the assumption is that the tree contains no literal
# user identifiers (ADR 0006).
paths = [
  '''adapters/claude-code/project-templates/.*''',
  '''adapters/claude-code/project-fragments/.*''',
  '''adapters/claude-code/user-level/settings\.json\.template''',
  '''adapters/claude-code/user-level/mcp/servers\.template\.json''',
  '''.*\.template''',
  '''.*\.md\.draft''',
  '''.*\.gitleaks\.toml''',
  '''.gitleaks\.toml''',
]

regexes = [
  '''\{\{[A-Z_][A-Z0-9_]*\}\}''',          # mustache placeholders
  '''YOUR[_-]?API[_-]?KEY[_-]?HERE''',     # legacy placeholder string
  '''<placeholder>''',
  '''ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx''',  # gitleaks own example
  '''sk-[a-zA-Z]+_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx''',
  '''(?i)example[_-]?(api|key|secret|token)''',
  '''\$\{?GITHUB_PERSONAL_ACCESS_TOKEN\}?''',
  '''GITHUB_PERSONAL_ACCESS_TOKEN=<token>''',
]
