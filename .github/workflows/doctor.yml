name: doctor
on:
  push:
    branches: [main]
  pull_request:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tree shellcheck jq

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run doctor.sh
        env:
          NO_COLOR: "1"
        run: ./tools/doctor.sh

      - name: Run delegated lint scripts
        env:
          NO_COLOR: "1"
        run: |
          ./tests/lint-skills.sh
          ./tests/lint-principles-language.sh
          ./tests/check-circular-refs.sh
          ./tests/validate-frontmatter.sh
