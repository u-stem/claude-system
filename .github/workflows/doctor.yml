name: doctor
on:
  push:
    branches: [main]
  pull_request:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tree shellcheck jq

      - name: Install gitleaks
        env:
          # gh release download authenticates via GITHUB_TOKEN, which avoids
          # the anonymous-rate-limit / occasional HTML-error-page that
          # `curl https://github.com/.../releases/download/...` ran into in
          # the rc1 follow-up CI run on 2026-04-29.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GITLEAKS_VERSION=8.21.2
          gh release download "v${GITLEAKS_VERSION}" \
            -R gitleaks/gitleaks \
            -p "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -O /tmp/gitleaks.tar.gz
          sudo tar -xz -C /usr/local/bin -f /tmp/gitleaks.tar.gz gitleaks
          gitleaks version

      - name: Run doctor.sh
        env:
          NO_COLOR: "1"
        run: ./tools/doctor.sh

      - name: Run delegated lint scripts
        env:
          NO_COLOR: "1"
        run: |
          ./tests/lint-skills.sh
          ./tests/lint-principles-language.sh
          ./tests/check-circular-refs.sh
          ./tests/validate-frontmatter.sh
